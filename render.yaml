services:
  # Backend Spring Boot Service (using Docker)
  - type: web
    name: student-manager-backend
    runtime: docker
    region: ohio
    plan: free
    rootDir: backend
    envVars:
      - key: PORT
        value: 8080

  # Frontend React Service (Static Site)
  - type: web
    name: student-manager-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: student-manager-backend
          property: host
        suffix: /api/students
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
