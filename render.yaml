services:
  # Backend Spring Boot Service
  - type: web
    name: student-manager-backend
    env: java
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/student-record-manager-1.0.0.jar
    envVars:
      - key: PORT
        value: 8080

  # Frontend React Service (Static Site)
  - type: web
    name: student-manager-frontend
    env: static
    region: ohio
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: student-manager-backend
          property: host
        suffix: /api/students
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
